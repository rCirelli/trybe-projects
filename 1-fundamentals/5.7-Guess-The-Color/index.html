<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Color Guess!</title>
</head>
<body>
  <header id="title"><h1>Color Guess!</h1></header>
  <div id="rgb-color"></div>
  <div>Score: <span id="score"></spanid>0</span></div>
  <div id="color-options">
    <span id="1" class="ball option"></span>
    <span id="2" class="ball option"></span>
    <span id="3" class="ball option"></span>
    <span id="4" class="ball option"></span>
    <span id="5" class="ball option"></span>
    <span id="6" class="ball option"></span>
  </div>
  <div id="answer">Escolha uma cor</div>
  <div id="controls">
    <button id="reset-game">Reset</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
